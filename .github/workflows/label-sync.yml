name: Sync Issue Labels & Assignees to PR

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  # Needed to read issues and write labels/assignees on PRs
  issues: read
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (no code needed)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Extract referenced issue numbers
        id: refs
        uses: actions/github-script@v6
        with:
          script: |
            const prBody = context.payload.pull_request.body || ''
            const title = context.payload.pull_request.title || ''
            const text = `${title}\n${prBody}`
            const issueNums = new Set()
            const regex = /(?:close[sd]?|fix(e[sd])?|resolve[sd]?)[\s:]*#(\d+)|#(\d+)/gi
            let match
            while ((match = regex.exec(text)) !== null) {
              const num = match[1] || match[2]
              if (num) issueNums.add(parseInt(num, 10))
            }
            core.setOutput('issues', JSON.stringify(Array.from(issueNums)))

      - name: Gather labels and assignees from referenced issues
        id: data
        if: steps.refs.outputs.issues != '[]'
        uses: actions/github-script@v6
        with:
          script: |
            const issueNumbers = JSON.parse('${{ steps.refs.outputs.issues }}')
            const labels = new Set()
            const assignees = new Set()
            for (const num of issueNumbers) {
              const { data } = await github.issues.get({ owner: context.repo.owner, repo: context.repo.repo, issue_number: num })
              for (const label of data.labels) {
                labels.add(label.name)
              }
              for (const assignee of data.assignees) {
                assignees.add(assignee.login)
              }
            }
            core.setOutput('labels', JSON.stringify(Array.from(labels)))
            core.setOutput('assignees', JSON.stringify(Array.from(assignees)))

      - name: Apply labels to PR
        if: steps.data.outputs.labels != '[]'
        uses: actions/github-script@v6
        with:
          script: |
            const prNumber = context.payload.pull_request.number
            const labels = JSON.parse('${{ steps.data.outputs.labels }}')
            await github.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: labels
            })

      - name: Assign PR to same assignees as issue
        if: steps.data.outputs.assignees != '[]'
        uses: actions/github-script@v6
        with:
          script: |
            const prNumber = context.payload.pull_request.number
            const assignees = JSON.parse('${{ steps.data.outputs.assignees }}')
            if (assignees.length > 0) {
              await github.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                assignees: assignees
              })
            }
